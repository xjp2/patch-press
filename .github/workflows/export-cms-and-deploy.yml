name: Export CMS and Deploy

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Who triggered this workflow'
        required: false
        default: 'manual'

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # Safeguard: Ensure package.json and package-lock.json are in sync
      # This prevents "npm ci" failures due to lock file drift
      - name: Validate lock file sync
        run: |
          echo "🔍 Checking if package.json and package-lock.json are in sync..."
          npm pkg get dependencies > /dev/null 2>&1 || exit 1
          # Install to check for drift (faster than npm ci for validation)
          npm install --package-lock-only
          # Check if lock file changed
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            echo "❌ ERROR: package.json and package-lock.json are out of sync!"
            echo "   Run 'npm install' locally and commit the updated package-lock.json"
            exit 1
          fi
          echo "✅ Lock file is in sync"

      - name: Install dependencies
        run: npm ci

      - name: Export CMS data from Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run export-cms

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain public/cms/)" ]; then
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.HAS_CHANGES == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git
          git add app/public/cms/
          git commit -m "🔄 Auto-update CMS content [${{ github.event.inputs.trigger_source }}]"
          git push

      - name: Deployment Status
        run: |
          if [ "${{ steps.check_changes.outputs.HAS_CHANGES }}" == "true" ]; then
            echo "✅ CMS data exported and committed. Vercel will auto-deploy."
          else
            echo "ℹ️ No changes detected in CMS data."
          fi
